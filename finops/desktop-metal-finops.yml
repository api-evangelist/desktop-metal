principles:
- name: Visibility
  description: Track equipment, consumable, and software spend through vendor invoices; Live Monitor exports support per-machine utilization analysis.
- name: Allocation
  description: Map machines, materials, and software seats to programs and cost centers.
- name: Optimization
  description: Use Live Monitor OEE/utilization data to maximize capacity and reduce consumable waste.
- name: Accountability
  description: Assign owners per machine/program and review capital and consumable spend against budget.
