description: >-
  FinOps view of Desktop Metal spend. Desktop Metal sells additive
  manufacturing hardware (printers, sintering furnaces), consumable materials
  and binders, service contracts, and Live Suite software licensing under an
  enterprise / capital-equipment model. There is no usage-based public API
  billing because no public developer API is documented. Cost management here
  concerns capital equipment, consumables, and software subscriptions rather
  than metered API consumption; meters below are not reconciled against any
  published billing data.
notes: >-
  Desktop Metal does not bill a public API. Hardware, materials, service, and
  software pricing is negotiated and not published. Desktop Metal is a
  subsidiary of Nano Dimension (acquisition closed April 2, 2025). Verify
  commercial and billing terms with the vendor.
