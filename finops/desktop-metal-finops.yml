  - product
- name: consumable_materials
  description: Metal/polymer powders, rods, and binders consumed per build, priced per unit.
  unit: units
  aggregation: sum
  dimensions:
  - account
  - material
- name: software_subscriptions
  description: Live Suite software licensing and subscriptions, billed per negotiated term.
  unit: subscriptions
