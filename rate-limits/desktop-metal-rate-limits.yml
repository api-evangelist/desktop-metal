description: >-
  Desktop Metal does not document a public developer API, so there are no
  published HTTP rate limits, quotas, or throttling policies to reconcile.
  The Live Suite / Live Monitor surfaces are browser-based product UIs with
  exportable data rather than a metered API. If any private or partner
  integration interface exists, its limits are not publicly documented.
notes: >-
  No public API rate-limit documentation exists. Revisit if Desktop Metal or
  its parent Nano Dimension publishes a developer API with documented limits.
