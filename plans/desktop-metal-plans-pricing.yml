description: >-
  Desktop Metal sells additive manufacturing hardware (binder jet and Bound
  Metal Deposition metal/polymer 3D printers, sintering furnaces), materials,
  and the Live Suite software hub through an enterprise / capital-equipment
  sales model with quotes via direct sales and channel partners. There is no
  public, self-service, usage-metered API pricing because Desktop Metal does
  not expose a documented public developer API. System, material, service,
  and software-subscription pricing is not published and is negotiated per
  customer; values below are not reconciled.
notes: >-
  Pricing for printers, furnaces, materials, and Live Suite software is quoted
  by Desktop Metal sales and partners and is not publicly listed. Desktop Metal
  is a subsidiary of Nano Dimension (acquisition closed April 2, 2025); contact
  the vendor for current commercial terms.
sources:
- https://www.desktopmetal.com/products/live-suite
- https://www.desktopmetal.com/contact
