    type: OpenAPI
  description: Live Platform provisions and manages Desktop Metal AM systems and users,
    and Live Monitor surfaces real-time fleet, printer, and furnace data (job/event
    status, time reporting, consumable usage, OEE) in a web browser with 30-day exportable
    history for trend analysis and Industry 4.0 integration. This is delivered as a
    product UI and data export, not as a documented public REST/HTTP API.
