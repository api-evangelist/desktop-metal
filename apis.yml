  - Live Build
  - Product Feature
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://www.desktopmetal.com/products/live-suite
  properties:
  - url: https://www.desktopmetal.com/products/live-suite
    type: Documentation
  - url: openapi/desktop-metal-openapi.yml
    type: OpenAPI
  description: Build preparation and slicing software for Desktop Metal printers. The
    legacy Fabricate and Fabricate MFG desktop applications have been replaced and
    upgraded by Live Studio (cloud build preparation for Bound Metal Deposition / Studio
    System) and Live Build MFG/DLP (binder jet and DLP build preparation). Distributed
    as installable/cloud applications; no documented public API surface.
