aid: desktop-metal
url: https://raw.githubusercontent.com/api-evangelist/desktop-metal/refs/heads/main/apis.yml
name: Desktop Metal
kind: company
description: Desktop Metal designs and manufactures additive manufacturing (3D printing)
  hardware and software for metal and polymer parts, including binder jet and Bound
  Metal Deposition printers, sintering furnaces, materials, and the cloud/desktop Live
  Suite software (Live Platform, Live Studio, Live Build, Live Sinter, Live Monitor)
  that replaced the legacy Fabricate applications. As of April 2025 Desktop Metal is
  a subsidiary of Nano Dimension. No public or partner developer API is documented;
  the surfaces below are product features rather than published HTTP APIs.
